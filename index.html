<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
  // iOSのSafariはタブごとに直前の拡大率を記憶して再現することがあるため、
  // 読み込み時にviewportを一瞬だけ強制指定し直して常に等倍(1.0)で開くようにする。
  // ピンチズーム自体は無効化しない（読み込み後すぐ元の設定に戻す）。
  (function(){
    var vp=document.querySelector('meta[name="viewport"]');
    if(!vp) return;
    var original=vp.getAttribute('content');
    function resetZoom(){
      vp.setAttribute('content',original+', maximum-scale=1.0');
      setTimeout(function(){ vp.setAttribute('content',original); },300);
    }
    window.addEventListener('load',resetZoom);
    window.addEventListener('pageshow',resetZoom);
  })();
</script>
<title>EasyChord</title>
<style>
  :root{
    --bg:#f5f5f3;--surface:#ffffff;--surface-1:#f0efec;
    --text:#1c1c1a;--text-secondary:#5f5e5a;--text-muted:#888780;
    --border:#dcdad3;--border-strong:#b4b2a9;
    --accent:#378ADD;--radius:8px;
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1c1c1a;--surface:#2c2c2a;--surface-1:#262625;
      --text:#f1efe8;--text-secondary:#b4b2a9;--text-muted:#888780;
      --border:#444441;--border-strong:#5f5e5a;--accent:#85B7EB;}
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:24px;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.6;}
  .wrap{max-width:1040px;margin:0 auto;}
  .layout{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
  .side-col{position:sticky;top:24px;}
  @media(max-width:880px){.layout{grid-template-columns:1fr;}.side-col{position:static;}}
  h1{font-size:18px;font-weight:600;margin:0 0 4px;}
  .sub{font-size:13px;color:var(--text-muted);margin:0 0 24px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .field label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;}
  select,input[type=text],input[type=number]{width:100%;height:34px;padding:0 8px;border:1px solid var(--border-strong);
    border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:13px;}
  input[type=range]{width:100%;}
  button{height:34px;padding:0 12px;border:1px solid var(--border-strong);border-radius:var(--radius);
    background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;}
  button:hover{background:var(--surface-1);}
  button:active{transform:scale(0.98);}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .row+.row{margin-top:10px;}
  .spacer{flex:1;}
  .small{font-size:12px;color:var(--text-secondary);}
  .muted{font-size:12px;color:var(--text-muted);}
  .iconbtn{width:40px;padding:0;font-size:16px;}
  .degree-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin:10px 0 4px;}
  .degree-btn{height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .degree-btn .label{font-size:10px;color:var(--text-muted);}
  .degree-btn .sym{font-size:13px;font-weight:600;}
  #list{display:flex;flex-direction:column;gap:4px;max-height:70vh;overflow:auto;}
  .entry-row{display:flex;flex-direction:column;gap:4px;padding:8px;border:1px solid var(--border);border-radius:var(--radius);}
  .entry-row .er-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .entry-row .er-top span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .entry-row .er-controls{display:flex;gap:4px;flex-wrap:wrap;}
  .entry-row select{height:26px;font-size:11px;}
  .entry-row input[type=text]{height:24px;font-size:11px;width:50px;flex-shrink:0;}
  .empty-note{font-size:13px;color:var(--text-muted);}
  .top-actions{display:flex;justify-content:flex-end;gap:8px;margin-bottom:8px;}
  .file-label{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;
    border:1px solid var(--border-strong);border-radius:var(--radius);cursor:pointer;font-size:13px;}
  .file-label input{display:none;}
  h2.panel-title{font-size:13px;font-weight:600;color:var(--text-secondary);margin:0 0 10px;}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--surface-1);
    border-radius:999px;padding:4px 10px;}
  .badge button{height:18px;width:18px;padding:0;font-size:11px;border:none;background:transparent;cursor:pointer;color:var(--text-muted);}
  .badge-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .minirow{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .minirow input,.minirow select{height:30px;font-size:12px;}
  .page{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;overflow:hidden;}
  .page-label{font-size:11px;color:var(--text-muted);margin-bottom:8px;}
  #sheet-scroller{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  #sheet{min-width:700px;} .page{min-width:700px;}
  .mobile-chord-btns{display:none;}
  @media(max-width:768px){
    #chordInputPanel{max-height:85vh!important;max-height:85dvh!important;}
    #chordInputPanel .row{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
    #chordInputPanel .row>*{flex-shrink:0;}
    #chordInputPanel .row .spacer{display:none;}
    #chordInputPanel .sel-bar-info{min-width:auto;}
    #chordInputPanel .row button{height:40px!important;font-size:15px!important;padding:0 12px;}
    #chordInputPanel .row select{height:40px!important;font-size:15px!important;}
    .compact-bar{flex-wrap:wrap!important;overflow-x:visible!important;gap:9px!important;}
    .compact-bar .note-chip{width:72px!important;height:72px!important;font-size:28px!important;}
    .compact-bar .sym-chip{min-width:72px!important;height:72px!important;font-size:17px!important;padding:0 12px!important;}
    .compact-bar .degree-btn-sm{height:72px!important;flex:1 1 92px!important;min-width:92px!important;}
    .compact-bar .degree-btn-sm .label{font-size:15px!important;}
    .compact-bar .degree-btn-sm .sym{font-size:21px!important;}
    .compact-bar .sep{height:52px!important;}
  }
  .note-item{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
    border:1px solid var(--border);border-radius:var(--radius);font-size:12px;cursor:pointer;user-select:none;}
  .note-item.sel{background:#fde68a;border-color:#f59e0b;color:#78350f;}
  @media(prefers-color-scheme:dark){.note-item.sel{background:#78350f;border-color:#f59e0b;color:#fde68a;}}
  .note-item-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;max-height:150px;overflow:auto;}
  #seekBar{width:100%;height:4px;cursor:pointer;accent-color:var(--accent);}
  /* Note palette */
  .note-palette{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px;
    background:var(--surface-1);border-radius:var(--radius);margin-bottom:10px;}
  .note-chip{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;
    border:1.5px solid var(--border-strong);border-radius:var(--radius);font-size:20px;
    cursor:grab;user-select:none;background:var(--surface);}
  .note-chip:hover{border-color:var(--accent);background:var(--surface-1);}
  .note-chip:active{cursor:grabbing;}
  .sym-chip{display:inline-flex;align-items:center;justify-content:center;min-width:40px;height:40px;
    padding:0 8px;border:1.5px solid var(--border-strong);border-radius:var(--radius);
    font-size:12px;font-weight:700;cursor:grab;user-select:none;background:var(--surface);white-space:nowrap;}
  .sym-chip:hover{border-color:var(--accent);background:var(--surface-1);}
  .sym-chip:active{cursor:grabbing;}
  /* Bar selection highlight is done via SVG fill */
  .sel-bar-info{font-size:12px;color:var(--accent);font-weight:600;min-width:100px;}
  .nc-hidden{opacity:0.3;}
  .tog-btn-on{background:var(--accent,#378ADD)!important;color:#fff!important;border-color:transparent!important;}

  /* フローティングコード入力パネル */
  #chordInputPanel {
    position: fixed; z-index: 1000;
    width: calc(100vw - 32px);
    max-height: 56vh; max-height: 56dvh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    border-radius: 12px;
  }
  .drag-handle {
    cursor: grab; display: flex; align-items: center; gap: 8px;
    padding-bottom: 8px; margin-bottom: 8px;
    border-bottom: 1px solid var(--border); user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle .drag-icon { font-size: 18px; color: var(--text-muted); flex-shrink: 0; }
  .snap-btn { height: 26px; padding: 0 10px; font-size: 11px; }
  .wrap { padding-bottom: 320px; }

  .page { position: relative; }
  .copyright-label {
    position: absolute; bottom: 8px; right: 14px;
    font-size: 11px; color: var(--text-muted);
    pointer-events: none; user-select: none;
    font-family: -apple-system, sans-serif;
  }

  /* コンパクトパレット */
  #chordInputPanel { padding: 10px 14px 8px; }
  #chordInputPanel .drag-handle { padding-bottom: 6px; margin-bottom: 6px; }
  #chordInputPanel .row { gap: 6px; }
  #chordInputPanel .row + .row { margin-top: 6px; }
  .compact-bar { display:flex; align-items:center; gap:6px; flex-wrap:nowrap; overflow-x:auto; margin-top:6px; padding:4px 0; }
  .compact-bar .note-chip { width:30px; height:30px; font-size:16px; flex-shrink:0; }
  .compact-bar .sym-chip { min-width:30px; height:30px; font-size:11px; padding:0 6px; flex-shrink:0; }
  .compact-bar .degree-btn-sm { height:30px; min-width:0; flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1px; border:1px solid var(--border-strong);
    border-radius:var(--radius); background:var(--surface); cursor:pointer; font-size:0; }
  .compact-bar .degree-btn-sm .label { font-size:9px; color:var(--text-muted); line-height:1; }
  .compact-bar .degree-btn-sm .sym { font-size:11px; font-weight:600; line-height:1; }
  .compact-bar .sep { width:1px; height:22px; background:var(--border); flex-shrink:0; }

  .compact-bar .degree-btn { height:30px; min-width:36px; flex:1; max-width:56px; gap:1px; border:1px solid var(--border-strong); border-radius:var(--radius); background:var(--surface); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .compact-bar .degree-btn .label { font-size:9px; }
  .compact-bar .degree-btn .sym { font-size:11px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>EasyChord</h1>
  <p class="sub">五線譜の小節をクリックして選択 → 数字キーでコード入力。ノートをドラッグして五線譜に配置できます。</p>

  <div class="layout">
    <div class="main-col">

      <div class="panel">
        <h2 class="panel-title">曲名・コピーライト</h2>
        <div class="row">
          <input type="text" id="titleInput" placeholder="曲名を入力" style="flex:1;">
          <span class="small">サイズ</span>
          <input type="range" id="titleFontSize" min="12" max="36" value="22" style="width:90px;">
          <span id="titleFontSizeOut" class="muted" style="min-width:32px;">22px</span>
          <select id="titleFontFamily" style="width:110px;">
            <option value="sans-serif">ゴシック</option>
            <option value="serif">明朝</option>
            <option value="Georgia,serif">Georgia</option>
            <option value="'Times New Roman',serif">Times</option>
            <option value="Arial,sans-serif">Arial</option>
          </select>
        </div>
        <div class="row" style="margin-top:8px;">
          <span class="small" style="white-space:nowrap;">© コピーライト</span>
          <input type="text" id="copyrightInput" placeholder="2026 作曲者名" style="flex:1;">
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">開始キーと拍子</h2>
        <div class="grid4">
          <div class="field"><label>キー</label><select id="rootSelect"></select></div>
          <div class="field"><label>モード</label>
            <select id="modeSelect"><option value="major">メジャー</option><option value="minor">マイナー</option></select>
          </div>
          <div class="field"><label>拍子 分子</label><input type="number" id="beatsNum" value="4" min="1" max="16"></div>
          <div class="field"><label>拍子 分母</label>
            <select id="beatsDen"><option value="2">2</option><option value="4" selected>4</option><option value="8">8</option><option value="16">16</option></select>
          </div>
        </div>
        <div class="field" style="margin-top:8px;"><label>1段あたりの小節数</label>
          <input type="number" id="barsPerRowInput" value="4" min="1" max="16">
        </div>
        <div class="minirow">
          <span class="small" style="white-space:nowrap;">転調：小節</span>
          <input type="number" id="keyChangeBar" value="1" min="1" style="width:60px;">
          <select id="keyChangeRoot" style="width:68px;"></select>
          <button id="addKeyChange">追加</button>
        </div>
        <div class="badge-wrap" id="keyChangeList"></div>
        <div class="minirow">
          <span class="small" style="white-space:nowrap;">拍子変更：小節</span>
          <input type="number" id="tsChangeBar" value="1" min="1" style="width:60px;">
          <input type="number" id="tsChangeNum" value="4" min="1" max="16" style="width:52px;">
          <span class="small">/</span>
          <select id="tsChangeDen" style="width:60px;"><option value="2">2</option><option value="4" selected>4</option><option value="8">8</option><option value="16">16</option></select>
          <button id="addTsChange">追加</button>
        </div>
        <div class="badge-wrap" id="tsChangeList"></div>
        <div class="minirow">
          <span class="small" style="white-space:nowrap;">セクション名（段の左に表示）</span>
        </div>
        <div class="badge-wrap" id="sectionList"></div>
      </div>

      <div class="panel">
        <h2 class="panel-title">小節の編集</h2>
        <div class="row">
          <span class="small">小節番号</span>
          <input type="number" id="barEditNum" value="1" min="1" style="width:70px;">
          <button id="barInsertAfterBtn">直後に1小節追加</button>
          <button id="barDeleteBtn">この小節を削除</button>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title">音源</h2>
        <div class="row">
          <label class="file-label">音源を選択<input type="file" id="audioInput" accept="audio/*"></label>
          <span id="fileName" class="muted">未選択</span>
        </div>
        <div class="row" style="margin-top:8px;">
          <button id="skipBack" class="iconbtn" title="5秒戻る">«5</button>
          <button id="playBtn" class="iconbtn" title="再生/一時停止">▶</button>
          <button id="skipFwd" class="iconbtn" title="5秒進む">5»</button>
          <span id="timeLabel" class="muted" style="font-family:var(--mono);min-width:90px;">0:00 / 0:00</span>
          <span class="spacer"></span>
          <span class="small">トランスポーズ</span>
          <select id="transposeSelect" style="width:100px;"></select>
        </div>
        <div style="margin-top:8px;"><input type="range" id="seekBar" value="0" min="0" max="1000" step="1"></div>
      </div>

      <div class="panel" id="chordInputPanel">
        <div class="drag-handle" id="chordDragHandle">
          <span class="drag-icon">⠿</span>
          <h2 class="panel-title" style="margin:0;">コード入力</h2>
          <span style="flex:1;"></span>
          <button class="snap-btn" id="snapTop">↑ 上に固定</button>
          <button class="snap-btn" id="snapBottom">↓ 下に固定</button>
        </div>
        <!-- 設定行 -->
        <div class="row">
          <select id="inputMode" style="width:170px;height:28px;font-size:12px;">
            <option value="diatonic_major">ダイアトニック（M）</option>
            <option value="diatonic_minor">ダイアトニック（m）</option>
            <option value="secondary">セカンダリーV7</option>
          </select>
          <span id="secondaryHint" class="muted" style="display:none;font-size:11px;">数字=どの度数へのV7</span>
          <button id="soundToggleBtn" class="tog-btn-on" style="height:28px;font-size:12px;">🔊 ON</button>
          <button id="ncToggleBtn" style="height:28px;font-size:12px;">N.C. 表示: OFF</button>
          <button id="accidentalToggleBtn" class="tog-btn-on" style="height:28px;font-size:12px;">♯ 表記</button>
          <button id="addSectionBtn" style="height:28px;font-size:12px;" title="選択中の小節を含む段の左端にセクション名テキストボックスを挿入">🏷 セクション追加</button>
          <span class="spacer"></span>
          <span class="sel-bar-info" id="selBarInfo" style="font-size:12px;">小節を選択</span>
          <span class="muted" id="curBeatLabel" style="font-size:12px;">—</span>
          <span class="small">文字</span>
          <input type="range" id="fontSizeInput" min="10" max="22" value="14" style="width:70px;">
          <span id="fontSizeOut" class="muted" style="min-width:28px;font-size:11px;">14px</span>
          <select id="chordFontFamily" style="width:80px;height:28px;font-size:11px;">
            <option value="sans-serif">ゴシック</option><option value="serif">明朝</option>
            <option value="Arial,sans-serif">Arial</option><option value="Georgia,serif">Georgia</option>
            <option value="'Times New Roman',serif">Times</option>
          </select>
        </div>
        <!-- 度数ボタン＋音符＋記号 を1行に -->
        <div class="compact-bar">
          <div class="degree-grid" id="degreeRow" style="display:contents;"></div>
          <div class="sep"></div>
          <span class="note-chip" draggable="true" data-dur="4" title="4分音符">♩</span>
          <span class="note-chip" draggable="true" data-dur="8" title="8分音符">♪</span>
          <span class="note-chip" draggable="true" data-dur="16" title="16分音符" style="width:22px;height:30px;">
            <svg viewBox="0 0 18 32" width="14" height="26" style="display:block;">
              <ellipse cx="5" cy="27" rx="5" ry="3.5" fill="currentColor" transform="rotate(-15 5 27)"/>
              <line x1="9.5" y1="27" x2="9.5" y2="4" stroke="currentColor" stroke-width="1.5"/>
              <path d="M9.5,4 C14,5 17,9 16,12" stroke="currentColor" stroke-width="1.5" fill="none"/>
              <path d="M9.5,10 C14,11 17,15 16,18" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
          </span>
          <label class="muted" style="display:flex;align-items:center;gap:3px;font-size:11px;flex-shrink:0;">
            <input type="checkbox" id="dragTieCheck" style="width:12px;height:12px;"> タイ
          </label>
          <div class="sep"></div>
          <span class="sym-chip" draggable="true" data-sym="start" title="リピート開始">|:</span>
          <span class="sym-chip" draggable="true" data-sym="end" title="リピート終了">:|</span>
          <span class="sym-chip" draggable="true" data-sym="segno" title="セーニョ" style="padding:2px;width:30px;height:30px;">
            <img id="segnoChipImg" style="height:26px;width:auto;display:block;" alt="Segno">
          </span>
          <span class="sym-chip" draggable="true" data-sym="coda" title="コーダ" style="padding:2px;width:36px;height:30px;">
            <img id="codaChipImg" style="height:22px;width:auto;display:block;" alt="Coda">
          </span>
          <span class="sym-chip" draggable="true" data-sym="dc" title="ダ・カーポ">D.C.</span>
          <span class="sym-chip" draggable="true" data-sym="ds" title="ダル・セーニョ">D.S.</span>
          <span class="sym-chip" draggable="true" data-sym="fine" title="フィーネ"><em>Fine</em></span>
          <span class="sym-chip" draggable="true" data-sym="tocoda" title="To Coda" style="font-style:italic;">to Coda</span>
        </div>
        <div class="mobile-chord-btns" id="mobileDegreeBtns"></div>
      </div>

      <div class="panel">
        <div class="top-actions">
          <button id="copyBtn">コピー</button>
          <button id="pdfBtn">PDF出力</button>
        </div>
        <h2 class="panel-title">リードシート（五線譜プレビュー）</h2>
        <div id="sheet-scroller"><div id="sheet"></div></div>
      </div>

    </div>

    <div class="side-col">
      <div class="panel">
        <div class="top-actions">
          <button id="clearBtn">全消去</button>
        </div>
        <h2 class="panel-title">入力済みコード</h2>
        <div id="list"></div>
      </div>
      <div class="panel">
        <div class="top-actions">
          <button id="deleteNoteBtn" disabled>選択を削除</button>
          <button id="clearNotesBtn">全消去</button>
        </div>
        <h2 class="panel-title">入力済み音符</h2>
        <div class="note-item-wrap" id="noteList"></div>
      </div>
      <div class="panel">
        <div class="top-actions">
          <button id="deleteRepeatBtn" disabled>選択を削除</button>
          <button id="clearRepeatsBtn">全消去</button>

  let audioCtx=null,audioBuffer=null,sourceNode=null;

  function getDetune(){ return (parseInt(transposeSelect.value,10)||0)*100; }
  async function loadAudio(url){
    if(sourceNode){try{sourceNode.stop();}catch(e){} sourceNode=null;}
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const res=await fetch(url); const arr=await res.arrayBuffer();

  function startPlayback(){
    if(!audioBuffer||!audioCtx) return;
    if(sourceNode){try{sourceNode.stop();}catch(e){}}
    sourceNode=audioCtx.createBufferSource(); sourceNode.buffer=audioBuffer;
    sourceNode.detune.value=getDetune(); sourceNode.connect(audioCtx.destination);

  }
  function currentElapsed(){ return isPlaying?Math.min(offsetSeconds+(audioCtx.currentTime-playStartCtx),durationSec):offsetSeconds; }
  function fmtTime(t){ const m=Math.floor(t/60),s=Math.floor(t%60).toString().padStart(2,'0'); return m+':'+s; }
  function updateTimeLabel(){ const t=Math.max(0,Math.min(currentElapsed(),durationSec)); timeLabel.textContent=fmtTime(t)+' / '+fmtTime(durationSec); }
  function updateSeekBar(){ if(seekDragging||!durationSec) return; seekBar.value=Math.round(currentElapsed()/durationSec*1000); }

  function timeSigAtBar(bar){ let r=timeSigChanges[0]; for(const c of timeSigChanges){ if(c.bar<=bar) r=c; } return r; }
  function beatsPerBarAtBar(bar){ return timeSigAtBar(bar).num; }
  function keyAtBar(bar){ let r=keyChanges[0]; for(const c of keyChanges){ if(c.bar<=bar) r=c; } return r; }
  function noteForDegreeAtRoot(degree,mode,rootIdx){ return (rootIdx+scaleArrays(mode).steps[degree-1])%12; }
  function currentForce(){ return inputModeSel.value==='diatonic_minor'?'minor':'major'; }

  function chordSymbol(entry){
    if(entry.nc) return 'N.C.';
    let base;
    if(entry.secondaryOf){
      const k=keyAtBar(entry.bar);
      const targetNote=noteForDegreeAtRoot(entry.secondaryOf,k.mode,k.root);
      const domRoot=(targetNote+7)%12;
      base=noteName(domRoot)+(entry.ext||'7');
    } else {
      const k=keyAtBar(entry.bar);
      const force=entry.forceScale||'major';
      const note=noteForDegreeAtRoot(entry.degree,force,k.root);
      const baseQ=scaleArrays(force).quality[entry.degree-1];
      base=noteName(note)+(entry.ext?entry.ext:(baseQ==='dim'?'dim':baseQ));
    }
    if(entry.bassNote!=null) base+='/'+noteName(entry.bassNote);
    return base;
  }
  function romanLabel(entry){
    if(entry.nc) return 'N.C.';
    if(entry.secondaryOf) return 'V'+(entry.ext||'7')+'/'+scaleArrays(keyAtBar(entry.bar).mode).roman[entry.secondaryOf-1];
    return scaleArrays(entry.forceScale||'major').roman[entry.degree-1];
  }
  function chordIntervalsAndRoot(entry){
    if(entry.nc) return null;
    if(entry.secondaryOf){
      const k=keyAtBar(entry.bar);
      const targetNote=noteForDegreeAtRoot(entry.secondaryOf,k.mode,k.root);
      return {rootNote:(targetNote+7)%12,intervals:INTERVALS[entry.ext||'7']||INTERVALS['7']};
    }
    const k=keyAtBar(entry.bar);
    const force=entry.forceScale||'major';
    const rootNote=noteForDegreeAtRoot(entry.degree,force,k.root);
    const baseQ=scaleArrays(force).quality[entry.degree-1];
    return {rootNote,intervals:INTERVALS[entry.ext||baseQ||'']||INTERVALS['']};
  }
  async function playChord(entry){
    if(!soundOn||entry.nc) return;
    try{
      await Tone.start();
      const synth=getSynth(); if(!synth) return;
      const ri=chordIntervalsAndRoot(entry); if(!ri) return;
      const notes=ri.intervals.map(iv=>Tone.Frequency(60+ri.rootNote+iv,'midi').toNote());
      synth.triggerAttackRelease(notes,'8n');
    }catch(e){ console.warn('playChord error',e); }
  }

  // Bar selection
  function selectBar(bar, beat=1){
    selectedBarNum=bar; curBar=bar; curBeat=beat;
    updateSelBarInfo(); buildDegreeButtons(); renderSheet();
  }
  function updateSelBarInfo(){
    if(curBar==null){ selBarInfo.textContent='小節を選択してください'; curBeatLabel.textContent='—'; return; }
    selBarInfo.textContent=curBar+'小節目を入力中';
    curBeatLabel.textContent=curBeat+'拍目';
    keyChangeBarInput.value=curBar;
    tsChangeBarInput.value=curBar;
  }

  // Degree buttons
  function buildDegreeButtons(){
    degreeRow.innerHTML=''; mobileDegreeBtns.innerHTML='';
    const secMode=inputModeSel.value==='secondary';
    secondaryHint.style.display=secMode?'inline':'none';
    const force=currentForce();
    const k=curBar!=null?keyAtBar(curBar):{root:parseInt(rootSelect.value,10),mode:modeSelect.value};
    const makeInner=(d)=>{
      let label,sym;
      if(secMode){
        const tn=noteForDegreeAtRoot(d,k.mode,k.root); const dr=(tn+7)%12;
        label='V7/'+scaleArrays(k.mode).roman[d-1]; sym=noteName(dr)+'7';
      } else {
        const note=noteForDegreeAtRoot(d,force,k.root); const q=scaleArrays(force).quality[d-1];
        label=d+'/'+scaleArrays(force).roman[d-1]; sym=noteName(note)+(q==='dim'?'dim':q);
      }
      return '<span class="label">'+label+'</span><span class="sym">'+sym+'</span>';
    };
    for(let d=1;d<=7;d++){
      const inner=makeInner(d);
      [degreeRow,mobileDegreeBtns].forEach(p=>{ const b=document.createElement('button'); b.className='degree-btn'; b.innerHTML=inner; b.addEventListener('click',()=>addEntry(d)); p.appendChild(b); });
    }
    // N.C.
    [degreeRow,mobileDegreeBtns].forEach(p=>{
      const b=document.createElement('button'); b.className='degree-btn';
      b.innerHTML='<span class="label">0/N.C.</span><span class="sym">N.C.</span>';
      b.addEventListener('click',addNCEntry); p.appendChild(b);
    });
  }

  function advanceBeat(){
    if(curBar==null) return;
    const bpb=beatsPerBarAtBar(curBar);
    if(curBeat<bpb){ curBeat++; }
    else { curBar++; curBeat=1; selectedBarNum=curBar; }
    updateSelBarInfo(); buildDegreeButtons();
    renderSheet(); // re-highlight
  }

  function addEntry(degree){
    if(curBar==null){ selectBar(1); }
    const secMode=inputModeSel.value==='secondary';
    entries=entries.filter(e=>!(e.bar===curBar&&e.beat===curBeat));
    const ne={bar:curBar,beat:curBeat,degree,secondaryOf:secMode?degree:null,forceScale:secMode?null:currentForce(),ext:'',nc:false,bassNote:null,ncVisible:true};
    entries.push(ne); entries.sort((a,b)=>a.bar-b.bar||a.beat-b.beat);
    advanceBeat(); renderList(); playChord(ne);
  }
  function addNCEntry(){
    if(curBar==null){ selectBar(1); }
    entries=entries.filter(e=>!(e.bar===curBar&&e.beat===curBeat));
    const ne={bar:curBar,beat:curBeat,degree:0,secondaryOf:null,forceScale:'major',ext:'',nc:true,bassNote:null,ncVisible:true};
    entries.push(ne); entries.sort((a,b)=>a.bar-b.bar||a.beat-b.beat);
    advanceBeat(); renderList();
  }

  function renderAll(){ buildDegreeButtons(); try{renderList();}catch(e){console.error(e);} try{renderSheet();}catch(e){console.error(e);} }

  function renderList(){
    listEl.innerHTML='';
    if(!entries.length){ listEl.innerHTML='<span class="empty-note">まだ入力がありません</span>'; return; }
    entries.forEach((e,i)=>{
      const row=document.createElement('div'); row.className='entry-row';
      if(e.nc&&!e.ncVisible) row.classList.add('nc-hidden');
      const top=document.createElement('div'); top.className='er-top';
      const sym=document.createElement('span');
      sym.textContent=chordSymbol(e)+'  ('+romanLabel(e)+')';
      sym.style.fontWeight='600'; sym.style.fontSize='13px';
      const posInput=document.createElement('input'); posInput.type='text'; posInput.value=e.bar+'.'+e.beat; posInput.style.fontFamily='var(--mono)';
      posInput.addEventListener('change',()=>{
        const pts=posInput.value.split('.'); const bar=parseInt(pts[0],10)||1,beat=parseInt(pts[1],10)||1;
        entries=entries.filter(x=>!(x.bar===bar&&x.beat===beat)||x===e); e.bar=bar; e.beat=beat;
        entries.sort((a,b)=>a.bar-b.bar||a.beat-b.beat); renderAll();
      });
      top.appendChild(sym); top.appendChild(posInput);
      const controls=document.createElement('div'); controls.className='er-controls';
      if(!e.nc){
        const extSel=document.createElement('select'); extSel.style.width='70px';
        EXT_OPTIONS.forEach(opt=>{ const o=document.createElement('option'); o.value=opt; o.textContent=opt===''?'自動':opt; if(opt===e.ext) o.selected=true; extSel.appendChild(o); });
        extSel.addEventListener('change',()=>{ e.ext=extSel.value; renderAll(); });
        const secSel=document.createElement('select'); secSel.style.width='90px';
        const noneOpt=document.createElement('option'); noneOpt.value=''; noneOpt.textContent=e.forceScale==='minor'?'ダイアトニック(m)':'ダイアトニック'; secSel.appendChild(noneOpt);
        for(let d=1;d<=7;d++){ const o=document.createElement('option'); o.value=d; o.textContent='V7/'+scaleArrays(keyAtBar(e.bar).mode).roman[d-1]; if(e.secondaryOf===d) o.selected=true; secSel.appendChild(o); }
        secSel.addEventListener('change',()=>{ e.secondaryOf=secSel.value?parseInt(secSel.value,10):null; if(e.secondaryOf) e.forceScale=null; else if(!e.forceScale) e.forceScale='major'; renderAll(); });
        const bassSel=document.createElement('select'); bassSel.style.width='60px'; bassSel.title='ベース音';
        const bassNone=document.createElement('option'); bassNone.value=''; bassNone.textContent='/—'; bassSel.appendChild(bassNone);
        NOTE_NAMES.forEach((n,ni)=>{ const o=document.createElement('option'); o.value=ni; o.textContent='/'+noteName(ni); if(e.bassNote===ni) o.selected=true; bassSel.appendChild(o); });
        bassSel.addEventListener('change',()=>{ e.bassNote=bassSel.value===''?null:parseInt(bassSel.value,10); renderAll(); });
        const play=document.createElement('button'); play.textContent='♪'; play.style.width='26px'; play.style.padding='0';
        play.addEventListener('click',()=>playChord(e));
        controls.appendChild(extSel); controls.appendChild(secSel); controls.appendChild(bassSel); controls.appendChild(play);
      } else {
        // N.C. 個別表示トグル
        const ncVis=document.createElement('button'); ncVis.textContent=e.ncVisible?'表示':'非表示'; ncVis.style.fontSize='11px'; ncVis.style.padding='0 6px';
        ncVis.addEventListener('click',()=>{ e.ncVisible=!e.ncVisible; renderAll(); });
        controls.appendChild(ncVis);
      }
      const del=document.createElement('button'); del.textContent='×'; del.style.width='26px'; del.style.padding='0';
      del.addEventListener('click',()=>{ entries.splice(i,1); renderAll(); });
      controls.appendChild(del);
      row.appendChild(top); row.appendChild(controls); listEl.appendChild(row);
    });
  }

  // Note list
  function renderNoteList(){
    noteListEl.innerHTML='';
    if(!rhythmEntries.length){ noteListEl.innerHTML='<span class="muted">音符がありません</span>'; return; }
    rhythmEntries.forEach(r=>{
      const el=document.createElement('span'); el.className='note-item'+(r.id===selectedNoteId?' sel':'');
      el.textContent=r.bar+'小節 '+(r.beatOffset+1)+'拍 '+DUR_LABELS[r.dur]+(r.tie?' ⌒':'');
      el.addEventListener('click',()=>{ selectedNoteId=(selectedNoteId===r.id)?null:r.id; deleteNoteBtn.disabled=(selectedNoteId==null); renderNoteList(); });
      noteListEl.appendChild(el);
    });
  }
  deleteNoteBtn.addEventListener('click',()=>{
    if(selectedNoteId==null) return;
    rhythmEntries=rhythmEntries.filter(r=>r.id!==selectedNoteId); selectedNoteId=null; deleteNoteBtn.disabled=true; renderNoteList(); renderSheet();
  });
  clearNotesBtn.addEventListener('click',()=>{ rhythmEntries=[]; selectedNoteId=null; deleteNoteBtn.disabled=true; renderNoteList(); renderSheet(); });

  const deleteRepeatBtn=document.getElementById('deleteRepeatBtn');
  const clearRepeatsBtn=document.getElementById('clearRepeatsBtn');
  function renderRepeatList(){
    const el=document.getElementById('repeatList');
    el.innerHTML='';
    if(!repeatEntries.length){ el.innerHTML='<span class="muted">記号がありません</span>'; return; }
    repeatEntries.forEach(r=>{
      const item=document.createElement('span');
      item.className='note-item'+(r.id===selectedRepeatId?' sel':'');
      item.textContent=r.bar+'小節 '+(SYM_LABELS[r.type]||r.type);
      item.addEventListener('click',()=>{ selectedRepeatId=(selectedRepeatId===r.id)?null:r.id; deleteRepeatBtn.disabled=(selectedRepeatId==null); renderRepeatList(); });
      el.appendChild(item);
    });
  }
  deleteRepeatBtn.addEventListener('click',()=>{
    if(selectedRepeatId==null) return;
    repeatEntries=repeatEntries.filter(r=>r.id!==selectedRepeatId); selectedRepeatId=null; deleteRepeatBtn.disabled=true; renderRepeatList(); renderSheet();
  });
  clearRepeatsBtn.addEventListener('click',()=>{ repeatEntries=[]; selectedRepeatId=null; deleteRepeatBtn.disabled=true; renderRepeatList(); renderSheet(); });

  // Build bar map
  function buildBarMap(){
    const map={};
    entries.forEach(e=>{
      const visible=!(e.nc&&(!e.ncVisible||!showNC));
      if(!visible) return;
      const bpb=beatsPerBarAtBar(e.bar),offset=(e.beat-1)/bpb;
      if(!map[e.bar]) map[e.bar]=[];
      map[e.bar].push({symbol:chordSymbol(e),offset});
    });
    return map;
  }

  function keySignatureAccidentals(root,mode){
    const majorRoot=mode==='minor'?(root+3)%12:root;
    const sig=MAJOR_KEY_SIG[majorRoot];
    if(sig.type==='sharp') return {type:'sharp',letters:SHARP_ORDER.slice(0,sig.count)};
    return {type:'flat',letters:FLAT_ORDER.slice(0,sig.count)};
  }

  // Note SVG
  function notesSVGForBar(bar,barX,barW,staffTop,lineGap,bpb){
    const staffMid=staffTop+lineGap*2; const stemH=lineGap*3;
    let svg='';
    const notes=rhythmEntries.filter(r=>r.bar===bar);
    notes.forEach((r,idx)=>{
      const nx=barX+4+(r.beatOffset/bpb)*(barW-8);
      const hy=staffMid; const rx=lineGap*0.55,ry=lineGap*0.38;
      svg+='<ellipse cx="'+(nx+rx)+'" cy="'+hy+'" rx="'+rx+'" ry="'+ry+'" fill="var(--text)" transform="rotate(-15 '+(nx+rx)+' '+hy+')" />';
      const stemX=nx+rx*2-1,stemTop=hy-stemH;
      svg+='<line x1="'+stemX+'" y1="'+hy+'" x2="'+stemX+'" y2="'+stemTop+'" stroke="var(--text)" stroke-width="1.2"/>';
      if(r.dur==='8'||r.dur==='16'){
        svg+='<path d="M'+stemX+','+stemTop+' C'+(stemX+6)+','+(stemTop+2)+' '+(stemX+lineGap*1.4)+','+(stemTop+lineGap*1.2-4)+' '+(stemX+lineGap*1.4)+','+(stemTop+lineGap*1.2)+'" stroke="var(--text)" stroke-width="1.4" fill="none"/>';
      }
      if(r.dur==='16'){
        const f2y=stemTop+lineGap*1.2;
        svg+='<path d="M'+stemX+','+f2y+' C'+(stemX+6)+','+(f2y+2)+' '+(stemX+lineGap*1.4)+','+(f2y+lineGap*1.2-4)+' '+(stemX+lineGap*1.4)+','+(f2y+lineGap*1.2)+'" stroke="var(--text)" stroke-width="1.4" fill="none"/>';
      }
      if(r.tie){
        const next=notes[idx+1];
        let tieEndX=next?(barX+4+(next.beatOffset/bpb)*(barW-8)):Math.min(nx+rx+Math.min(barW/Math.max(bpb,1),lineGap*5),barX+barW-6);
        const tieY=hy+ry+3; const midX=(nx+rx+tieEndX)/2;
        svg+='<path d="M'+(nx+rx)+','+tieY+' Q'+midX+','+(tieY+lineGap*0.9)+' '+tieEndX+','+tieY+'" stroke="var(--text)" stroke-width="1.2" fill="none"/>';
      }
    });
    return svg;
  }

  // リピート記号SVG
  function repeatsSVGForBar(bar,x,barW,staffTop,staffHeight,lineGap){
    let svg='';
    const reps=repeatEntries.filter(r=>r.bar===bar);
    if(!reps.length) return svg;
    const ty=staffTop+staffHeight+12; // テキスト類のY位置（スタッフ下）
    let dcOffset=0; // D.C./D.S./Fine が重ならないようオフセット
    reps.forEach(r=>{
      switch(r.type){
        case 'start':
          svg+='<rect x="'+x+'" y="'+staffTop+'" width="4" height="'+staffHeight+'" fill="var(--text)"/>';
          svg+='<line x1="'+(x+6)+'" y1="'+staffTop+'" x2="'+(x+6)+'" y2="'+(staffTop+staffHeight)+'" stroke="var(--text)" stroke-width="1.2"/>';
          svg+='<circle cx="'+(x+10)+'" cy="'+(staffTop+lineGap*1.5)+'" r="2.2" fill="var(--text)"/>';
          svg+='<circle cx="'+(x+10)+'" cy="'+(staffTop+lineGap*2.5)+'" r="2.2" fill="var(--text)"/>';
          break;
        case 'end':
          svg+='<rect x="'+(x+barW-4)+'" y="'+staffTop+'" width="4" height="'+staffHeight+'" fill="var(--text)"/>';
          svg+='<line x1="'+(x+barW-6)+'" y1="'+staffTop+'" x2="'+(x+barW-6)+'" y2="'+(staffTop+staffHeight)+'" stroke="var(--text)" stroke-width="1.2"/>';
          svg+='<circle cx="'+(x+barW-10)+'" cy="'+(staffTop+lineGap*1.5)+'" r="2.2" fill="var(--text)"/>';
          svg+='<circle cx="'+(x+barW-10)+'" cy="'+(staffTop+lineGap*2.5)+'" r="2.2" fill="var(--text)"/>';
          break;
        case 'segno':
          {
            // セーニョ: 1拍目のコード名左上に配置
            const sh=24, sw=Math.round(sh*460/514);
            const sx=x+barW*0.12-30, sy=staffTop-8-sh-6;
            const dfilt=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'invert(1)':'';
            svg+='<image href="'+SEGNO_IMG+'" x="'+sx+'" y="'+sy+'" width="'+sw+'" height="'+sh+'"'+(dfilt?' style="filter:invert(1)"':'')+'/>';
          }
          break;
        case 'coda':
          {
            // コーダ: 1拍目のコード名左上に配置
            const ch=18, cw=Math.round(ch*453/340);
            const cxi=x+barW*0.12-30, cyi=staffTop-8-ch-6;
            const dfilt2=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'invert(1)':'';
            svg+='<image href="'+CODA_IMG+'" x="'+cxi+'" y="'+cyi+'" width="'+cw+'" height="'+ch+'"'+(dfilt2?' style="filter:invert(1)"':'')+'/>';
          }
          break;
        case 'dc':
          svg+='<text x="'+(x+barW-4)+'" y="'+(ty-dcOffset)+'" font-size="12" text-anchor="end" fill="var(--text)" font-weight="700">D.C.</text>';
          dcOffset-=14;
          break;
        case 'ds':
          svg+='<text x="'+(x+barW-4)+'" y="'+(ty-dcOffset)+'" font-size="12" text-anchor="end" fill="var(--text)" font-weight="700">D.S.</text>';
          dcOffset-=14;
          break;
        case 'fine':
          svg+='<text x="'+(x+barW-4)+'" y="'+(ty-dcOffset)+'" font-size="12" text-anchor="end" fill="var(--text)" font-style="italic" font-weight="600">Fine</text>';
          dcOffset-=14;
          break;
        case 'tocoda':
          svg+='<text x="'+(x+barW-4)+'" y="'+(ty-dcOffset)+'" font-size="12" text-anchor="end" fill="var(--text)" font-style="italic" font-weight="600">to Coda</text>';
          dcOffset-=14;
          break;
      }
    });
    return svg;
  }

  // Key change marker
  function keyChangeSVGForBar(bar,x,staffTop,lineGap){
    const kc=keyChanges.find(c=>c.bar===bar);
    if(!kc||kc===keyChanges[0]) return '';
    const acc=keySignatureAccidentals(kc.root,kc.mode);
    const ch=acc.type==='sharp'?'♯':'♭';
    let svg='';
    acc.letters.forEach((letter,idx)=>{
      const step=acc.type==='sharp'?SHARP_STEPS[letter]:FLAT_STEPS[letter];
      const y=staffTop+step*(lineGap/2);
      svg+='<text x="'+(x+2+idx*7)+'" y="'+(y+3)+'" font-size="11" fill="var(--accent,#378ADD)">'+ch+'</text>';
    });
    if(acc.letters.length===0) svg+='<text x="'+(x+2)+'" y="'+(staffTop+lineGap*2+4)+'" font-size="9" fill="var(--accent,#378ADD)">♮</text>';
    return svg;
  }

  // Main SVG row renderer
  function renderStaffRowSVG(barNums,barMap,width,fontSize,rowKey,tsBarsSet,sectionText){
    const lineGap=8; const staffTop=Math.max(30,fontSize+16); const staffHeight=lineGap*4;
    const h=staffTop+staffHeight+30;
    const acc=keySignatureAccidentals(rowKey.root,rowKey.mode);
    const hasSection=sectionText!=null;
    const leadIn=hasSection?SECTION_LABEL_W:0;
    const clefX=2+leadIn,clefWidth=18,accStartX=clefX+clefWidth+2,accSpacing=7;
    const ts=timeSigAtBar(barNums[0]);
    const tsWidth=tsBarsSet.has(barNums[0])?(ts.num>=10?18:12):0;
    const barsStartX=accStartX+acc.letters.length*accSpacing+4+tsWidth;
    const barsWidth=width-barsStartX-6;
    const barW=barsWidth/barNums.length;
    const cfam=chordFontFamily.value||'sans-serif';
    const FIXED_W=700;

    const topPad=16;
    let svg='<svg viewBox="0 -'+topPad+' '+FIXED_W+' '+(h+topPad)+'" width="'+FIXED_W+'" height="'+(h+topPad)+'" style="display:block;max-width:none;overflow:visible;" role="img">';
    // セクションテキストボックス（段の一番左）
    if(hasSection){
      const boxW=leadIn-6;
      svg+='<rect x="2" y="'+(staffTop+2)+'" width="'+boxW+'" height="'+(staffHeight-4)+'" rx="3" fill="none" stroke="white"/>';
      if(sectionText){
        const fitsFree=sectionText.length*7<=boxW-4;
        const lenAttr=fitsFree?'':' textLength="'+(boxW-4)+'" lengthAdjust="spacingAndGlyphs"';
        svg+='<text x="'+(2+boxW/2)+'" y="'+(staffTop+staffHeight/2+4)+'" font-size="12" font-weight="600" text-anchor="middle" fill="var(--text)"'+lenAttr+'>'+escapeXml(sectionText)+'</text>';
      }
    }
    // 五線
    for(let i=0;i<5;i++){
      const y=staffTop+i*lineGap;
      svg+='<line x1="'+clefX+'" y1="'+y+'" x2="'+(width-4)+'" y2="'+y+'" stroke="var(--border-strong)" stroke-width="1"/>';
    }
    // ト音記号
    svg+='<text x="'+clefX+'" y="'+(staffTop+staffHeight*0.78)+'" font-size="'+(staffHeight*1.9)+'" fill="var(--text)" font-family="serif">𝄞</text>';
    // 調号
    acc.letters.forEach((letter,idx)=>{
      const step=acc.type==='sharp'?SHARP_STEPS[letter]:FLAT_STEPS[letter];
      const y=staffTop+step*(lineGap/2);
      const ch=acc.type==='sharp'?'♯':'♭';
      svg+='<text x="'+(accStartX+idx*accSpacing)+'" y="'+(y+3)+'" font-size="13" fill="var(--text)">'+ch+'</text>';
    });
    // 拍子（段先頭）
    if(tsBarsSet.has(barNums[0])){
      const tsX=accStartX+acc.letters.length*accSpacing+2;
      svg+='<text x="'+tsX+'" y="'+(staffTop+staffHeight*0.45)+'" font-size="'+(staffHeight*0.43)+'" font-weight="600" fill="var(--text)">'+ts.num+'</text>';
      svg+='<text x="'+tsX+'" y="'+(staffTop+staffHeight*0.95)+'" font-size="'+(staffHeight*0.43)+'" font-weight="600" fill="var(--text)">'+ts.den+'</text>';
    }
    svg+='<line x1="'+barsStartX+'" y1="'+staffTop+'" x2="'+barsStartX+'" y2="'+(staffTop+staffHeight)+'" stroke="var(--border-strong)" stroke-width="1"/>';

    barNums.forEach((bar,idx)=>{
      const x=barsStartX+idx*barW;
      const bpb=beatsPerBarAtBar(bar);
      // 座標を保存（drag & drop 用）
      // barCoordMapはSVG座標で保存、実際はviewBoxと一致
      barCoordMap[bar]={svgX:x,svgW:barW,staffTop,staffH:staffHeight,bpb};
      // 拍ごとのハイライトとヒットエリア（4拍単位でクリック選択）
      const beatW=barW/bpb;
      // 選択中の小節のハイライト背景
      if(bar===selectedBarNum){
        svg+='<rect x="'+x+'" y="'+staffTop+'" width="'+barW+'" height="'+staffHeight+'" fill="rgba(55,138,221,0.08)" rx="2"/>';
      }
      // 拍の区切り線（細い点線）
      for(let b=1;b<bpb;b++){
        const bx=x+b*beatW;
        svg+='<line x1="'+bx+'" y1="'+(staffTop+3)+'" x2="'+bx+'" y2="'+(staffTop+staffHeight-3)+'" stroke="var(--border)" stroke-width="0.6" stroke-dasharray="2,2"/>';
      }
      svg+='<line x1="'+(x+barW)+'" y1="'+staffTop+'" x2="'+(x+barW)+'" y2="'+(staffTop+staffHeight)+'" stroke="var(--border-strong)" stroke-width="1"/>';
      // 転調マーカー
      svg+=keyChangeSVGForBar(bar,x,staffTop,lineGap);
      // コード
      const chords=barMap[bar];
      if(chords&&chords.length){
        chords.forEach(c=>{
          const cx=x+6+c.offset*(barW-12);
          svg+='<text x="'+cx+'" y="'+(staffTop-8)+'" font-size="'+fontSize+'" font-weight="600" fill="var(--text)" font-family="'+cfam+'">'+c.symbol+'</text>';
        });
      } else {
        svg+='<text x="'+(x+barW/2)+'" y="'+(staffTop+staffHeight/2+4)+'" font-size="'+Math.max(10,fontSize-2)+'" text-anchor="middle" fill="var(--text-muted)">%</text>';
      }
      // 小節番号
      if(idx===0) svg+='<text x="'+(x+2)+'" y="'+(staffTop+staffHeight+14)+'" font-size="10" fill="var(--text-muted)">'+bar+'</text>';
      // 拍子変更（段内）
      if(idx>0&&tsBarsSet.has(bar)){
        const ts2=timeSigAtBar(bar);
        svg+='<text x="'+(x+2)+'" y="'+(staffTop+staffHeight*0.45)+'" font-size="'+(staffHeight*0.43)+'" font-weight="600" fill="var(--accent,#378ADD)">'+ts2.num+'</text>';
        svg+='<text x="'+(x+2)+'" y="'+(staffTop+staffHeight*0.95)+'" font-size="'+(staffHeight*0.43)+'" font-weight="600" fill="var(--accent,#378ADD)">'+ts2.den+'</text>';
      }
      // 音符
      svg+=notesSVGForBar(bar,x,barW,staffTop,lineGap,bpb);
      svg+=repeatsSVGForBar(bar,x,barW,staffTop,staffHeight,lineGap);
      // 拍ごとのヒットエリア（クリック & ドロップ）
      for(let b=1;b<=bpb;b++){
        const bx=x+(b-1)*beatW;
        const isThisBeat=(bar===curBar&&b===curBeat);
        const beatFill=isThisBeat?'rgba(55,138,221,0.28)':'rgba(0,0,0,0)';
        svg+='<rect class="beat-hit" data-bar="'+bar+'" data-beat="'+b+'" x="'+bx+'" y="'+staffTop+'" width="'+beatW+'" height="'+staffHeight+'" fill="'+beatFill+'" cursor="pointer" pointer-events="all"/>';
      }
    });

    svg+='</svg>';
    return svg;
  }

  // Sheet rendering
  function renderSheet(){
    sheetEl.innerHTML=''; barCoordMap={};
    const allBars=[...new Set([...entries.map(e=>e.bar),...rhythmEntries.map(r=>r.bar)])];
    if(curBar!=null) allBars.push(curBar);
    // エントリがなくても最低4段分の小節を表示してクリックできるようにする
    const bpRow2=parseInt(barsPerRowInput.value,10)||4;
    const minBars=bpRow2*4;
    const maxBar=Math.max(...allBars, minBars);
    const barsPerRow=parseInt(barsPerRowInput.value,10)||4;
    const fontSize=parseInt(fontSizeInput.value,10)||14;
    const tFontSize=parseInt(titleFontSize.value,10)||22;
    const tFontFamily=titleFontFamily.value||'sans-serif';
    const barMap=buildBarMap();
    const tsBarsSet=new Set(timeSigChanges.map(c=>c.bar));
    const width=700;
    const rows=[];
    for(let rs=1;rs<=maxBar;rs+=barsPerRow){
      const bn=[]; for(let b=rs;b<rs+barsPerRow;b++) bn.push(b); rows.push(bn);
    }
    const A4_ASPECT=3508/2480;
    const a4H=Math.round(width*A4_ASPECT); // 700pxの内容幅に対するA4比率の高さ（例:990px）
    const rowHeightPx=Math.max(30,fontSize+16)+32+30+16;
    const pageHeaderPx=44;
    const titleHeightPx=titleInput.value?(tFontSize*2.2+12):0;
    const availableH=a4H-pageHeaderPx;
    const rowsPerPageBase=Math.max(1,Math.floor(availableH/rowHeightPx));
    const rowsPerPage1=Math.max(1,Math.floor((availableH-titleHeightPx)/rowHeightPx));
    const totalPagesCalc=rows.length<=rowsPerPage1?1:1+Math.ceil((rows.length-rowsPerPage1)/rowsPerPageBase);

    let rowIdx=0,pageNum=0;
    while(rowIdx<rows.length){
      pageNum++;
      const rpp=pageNum===1?rowsPerPage1:rowsPerPageBase;
      const pageRows=rows.slice(rowIdx,rowIdx+rpp); rowIdx+=rpp;
      const pageDiv=document.createElement('div'); pageDiv.className='page'; pageDiv.style.width=(width+32)+'px';
      pageDiv.style.height=(a4H+32)+'px'; // A4比率の高さ + padding(16*2)。box-sizing:border-boxのためコンテンツ領域はa4H相当になる
      const label=document.createElement('div'); label.className='page-label'; label.textContent=pageNum+'/'+totalPagesCalc; pageDiv.appendChild(label);
      if(pageNum===1&&titleInput.value){
        const th=Math.round(tFontSize*2.2+12);
        const titleSvg=document.createElement('div');
        titleSvg.innerHTML='<svg viewBox="0 0 '+width+' '+th+'" width="'+width+'" height="'+th+'">'
          +'<text x="'+(width/2)+'" y="'+(th*0.72)+'" font-size="'+tFontSize+'" font-weight="700" text-anchor="middle" fill="var(--text)" font-family="'+tFontFamily+'">'+titleInput.value+'</text></svg>';
        pageDiv.appendChild(titleSvg);
      }
      pageRows.forEach(barNums=>{
        const rowKey=keyAtBar(barNums[0]);
        const div=document.createElement('div');
        div.innerHTML=renderStaffRowSVG(barNums,barMap,width,fontSize,rowKey,tsBarsSet,sectionTextForBar(barNums[0]));
        pageDiv.appendChild(div);
      });
      // コピーライトをページ右下に表示
      if(copyrightInput.value.trim()){
        const cpEl=document.createElement('div');
        cpEl.className='copyright-label';
        cpEl.textContent='\u00A9 '+copyrightInput.value.trim();
        pageDiv.appendChild(cpEl);
      }
      sheetEl.appendChild(pageDiv);
    }
  }

  function getBarBeatFromEvent(e){
    let el=e.target;
    while(el&&el!==sheetEl){
      if(el.dataset&&el.dataset.bar){
        return {bar:parseInt(el.dataset.bar), beat:el.dataset.beat?parseInt(el.dataset.beat):1};
      }
      el=el.parentElement;
    }
    return null;
  }
  function getBarFromEvent(e){
    const r=getBarBeatFromEvent(e); return r?r.bar:null;
  }

  function handleSheetClick(e){
    const r=getBarBeatFromEvent(e); if(!r) return;
    selectBar(r.bar, r.beat);
  }

  function handleDragOver(e){
    const bar=getBarFromEvent(e); if(bar==null) return;
    e.preventDefault(); e.dataTransfer.dropEffect='copy';
  }

  function handleDrop(e){
    const bar=getBarFromEvent(e); if(bar==null) return;
    e.preventDefault();
    const sym=e.dataTransfer.getData('sym');
    if(sym){
      repeatEntries.push({id:++repeatIdCounter,bar,type:sym});
      repeatEntries.sort((a,b)=>a.bar-b.bar);
      renderRepeatList(); renderSheet(); return;
    }
    const dur=e.dataTransfer.getData('dur')||'4';
    const tie=e.dataTransfer.getData('tie')==='true';
    // SVG座標に変換してbeat計算
    let beatOffset=0;
    try{
      const svgEl=e.target.closest('svg');
      if(svgEl&&barCoordMap[bar]){
        const coords=barCoordMap[bar];
        const pt=svgEl.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
        const svgCoords=pt.matrixTransform(svgEl.getScreenCTM().inverse());
        let raw=((svgCoords.x-coords.svgX)/coords.svgW)*coords.bpb;
        raw=Math.max(0,Math.min(coords.bpb-0.001,raw));
        beatOffset=Math.round(raw*2)/2;
      }
    }catch(err){}
    rhythmEntries.push({id:++rhythmIdCounter,bar,beatOffset,dur,tie});
    rhythmEntries.sort((a,b)=>a.bar-b.bar||a.beatOffset-b.beatOffset);
    renderNoteList(); renderSheet();
  }

  // Note palette drag（マウス）
  document.querySelectorAll('.note-chip').forEach(chip=>{
    chip.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('dur',chip.dataset.dur);
      e.dataTransfer.setData('tie',document.getElementById('dragTieCheck').checked?'true':'false');
      e.dataTransfer.effectAllowed='copy';
    });
  });

  // タッチドラッグ（スマホ・タブレット）
  let touchDragDur=null, touchGhost=null;
  document.querySelectorAll('.note-chip').forEach(chip=>{
    chip.addEventListener('touchstart',e=>{
      e.preventDefault();
      touchDragDur=chip.dataset.dur;
      touchGhost=document.createElement('div');
      touchGhost.style.cssText='position:fixed;z-index:9999;pointer-events:none;width:44px;height:44px;border-radius:8px;background:var(--accent);opacity:0.85;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;';
      touchGhost.textContent={'4':'♩','8':'♪','16':'♬'}[chip.dataset.dur]||'♩';
      document.body.appendChild(touchGhost);
      const t=e.touches[0];
      touchGhost.style.left=(t.clientX-22)+'px'; touchGhost.style.top=(t.clientY-44)+'px';
    },{passive:false});
    chip.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(!touchGhost) return;
      const t=e.touches[0];
      touchGhost.style.left=(t.clientX-22)+'px'; touchGhost.style.top=(t.clientY-44)+'px';
    },{passive:false});
    chip.addEventListener('touchend',e=>{
      e.preventDefault();
      if(touchGhost){touchGhost.remove();touchGhost=null;}
      if(!touchDragDur) return;
      const t=e.changedTouches[0];
      // タッチ位置の要素を取得（ghostを一時的に非表示にして）
      const el=document.elementFromPoint(t.clientX,t.clientY);
      touchDragDur=null;
      if(!el) return;
      let target=el;
      while(target&&target!==sheetEl){
        if(target.dataset&&target.dataset.bar) break;
        target=target.parentElement;
      }
      if(!target||!target.dataset||!target.dataset.bar) return;
      const bar=parseInt(target.dataset.bar);
      const tie=document.getElementById('dragTieCheck').checked;
      const dur=chip.dataset.dur;
      let beatOffset=0;
      try{
        const svgEl=target.closest?target.closest('svg'):null;
        if(svgEl&&barCoordMap[bar]){
          const coords=barCoordMap[bar];
          const pt=svgEl.createSVGPoint(); pt.x=t.clientX; pt.y=t.clientY;
          const sc=pt.matrixTransform(svgEl.getScreenCTM().inverse());
          let raw=((sc.x-coords.svgX)/coords.svgW)*coords.bpb;
          raw=Math.max(0,Math.min(coords.bpb-0.001,raw));
          beatOffset=Math.round(raw*2)/2;
        }
      }catch(err){}
      rhythmEntries.push({id:++rhythmIdCounter,bar,beatOffset,dur,tie});
      rhythmEntries.sort((a,b)=>a.bar-b.bar||a.beatOffset-b.beatOffset);
      renderNoteList(); renderSheet();
    },{passive:false});
  });

  // 記号チップ ドラッグ（マウス）
  document.querySelectorAll('.sym-chip').forEach(chip=>{
    chip.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('sym',chip.dataset.sym);
      e.dataTransfer.effectAllowed='copy';
    });
  });

  // 記号チップ タッチドラッグ（スマホ・タブレット）
  document.querySelectorAll('.sym-chip').forEach(chip=>{
    chip.addEventListener('touchstart',e=>{
      e.preventDefault();
      touchGhost=document.createElement('div');
      touchGhost.style.cssText='position:fixed;z-index:9999;pointer-events:none;min-width:44px;height:44px;border-radius:8px;background:var(--accent);opacity:0.85;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;padding:0 8px;';
      touchGhost.textContent=chip.dataset.sym==='start'?'|:':chip.dataset.sym==='end'?':|':chip.dataset.sym==='segno'?'§':chip.dataset.sym==='coda'?'⊕':chip.dataset.sym==='tocoda'?'to Coda':chip.dataset.sym.toUpperCase();
      document.body.appendChild(touchGhost);
      const t=e.touches[0];
      touchGhost.style.left=(t.clientX-22)+'px'; touchGhost.style.top=(t.clientY-44)+'px';
    },{passive:false});
    chip.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(!touchGhost) return;
      const t=e.touches[0];
      touchGhost.style.left=(t.clientX-22)+'px'; touchGhost.style.top=(t.clientY-44)+'px';
    },{passive:false});
    chip.addEventListener('touchend',e=>{
      e.preventDefault();
      if(touchGhost){touchGhost.remove();touchGhost=null;}
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      if(!el) return;
      let target=el;
      while(target&&target!==sheetEl){
        if(target.dataset&&target.dataset.bar) break;
        target=target.parentElement;
      }
      if(!target||!target.dataset||!target.dataset.bar) return;
      const bar=parseInt(target.dataset.bar);
      repeatEntries.push({id:++repeatIdCounter,bar,type:chip.dataset.sym});
      repeatEntries.sort((a,b)=>a.bar-b.bar);
      renderRepeatList(); renderSheet();
    },{passive:false});
  });

  // Key/TS change lists
  function renderKeyChangeList(){
    keyChangeListEl.innerHTML='';
    keyChanges.forEach((c,i)=>{
      const b=document.createElement('span'); b.className='badge';
      b.innerHTML='<span>'+c.bar+'小節: '+noteName(c.root)+(c.mode==='major'?' Maj':' Min')+'</span>';
      if(i>0){ const d=document.createElement('button'); d.textContent='×'; d.addEventListener('click',()=>{ keyChanges.splice(i,1); renderKeyChangeList(); renderAll(); }); b.appendChild(d); }
      keyChangeListEl.appendChild(b);
    });
  }
  function renderTsChangeList(){
    tsChangeListEl.innerHTML='';
    timeSigChanges.forEach((c,i)=>{
      const b=document.createElement('span'); b.className='badge';
      b.innerHTML='<span>'+c.bar+'小節: '+c.num+'/'+c.den+'</span>';
      if(i>0){ const d=document.createElement('button'); d.textContent='×'; d.addEventListener('click',()=>{ timeSigChanges.splice(i,1); renderTsChangeList(); renderAll(); }); b.appendChild(d); }
      tsChangeListEl.appendChild(b);
    });
  }
  function renderSectionList(){
    sectionListEl.innerHTML='';
    if(!sectionLabels.length){ sectionListEl.innerHTML='<span class="empty-note" style="font-size:11px;">「🏷 セクション追加」ボタンで小節を選択して追加できます</span>'; return; }
    sectionLabels.forEach((s,i)=>{
      const b=document.createElement('span'); b.className='badge';
      const barLabel=document.createElement('span'); barLabel.textContent=s.bar+'小節目〜'; barLabel.style.color='var(--text-muted)'; barLabel.style.fontSize='11px';
      const inp=document.createElement('input'); inp.type='text'; inp.value=s.text; inp.placeholder='セクション名';
      inp.style.width='90px'; inp.style.height='22px'; inp.style.fontSize='12px'; inp.style.border='1px solid var(--border)'; inp.style.borderRadius='4px'; inp.style.padding='0 4px';
      inp.addEventListener('input',()=>{ s.text=inp.value; renderSheet(); });
      const d=document.createElement('button'); d.textContent='×'; d.addEventListener('click',()=>{ sectionLabels.splice(i,1); renderSectionList(); renderSheet(); });
      b.appendChild(barLabel); b.appendChild(inp); b.appendChild(d);
      sectionListEl.appendChild(b);
    });
  }
  function rowStartBar(bar){
    const bpr=parseInt(barsPerRowInput.value,10)||4;
    return 1+Math.floor((bar-1)/bpr)*bpr;
  }
  function sectionTextForBar(bar){
    const s=sectionLabels.find(x=>x.bar===bar);
    return s?s.text:null;
  }

  document.getElementById('addKeyChange').addEventListener('click',()=>{
    const bar=parseInt(document.getElementById('keyChangeBar').value,10)||1;
    const root=parseInt(document.getElementById('keyChangeRoot').value,10);
    const mode=keyAtBar(bar).mode;
    keyChanges=keyChanges.filter(c=>c.bar!==bar); keyChanges.push({bar,root,mode}); keyChanges.sort((a,b)=>a.bar-b.bar);
    renderKeyChangeList(); renderAll();
  });
  document.getElementById('addTsChange').addEventListener('click',()=>{
    const bar=parseInt(document.getElementById('tsChangeBar').value,10)||1;
    const num=parseInt(document.getElementById('tsChangeNum').value,10)||4;
    const den=parseInt(document.getElementById('tsChangeDen').value,10)||4;
    timeSigChanges=timeSigChanges.filter(c=>c.bar!==bar); timeSigChanges.push({bar,num,den}); timeSigChanges.sort((a,b)=>a.bar-b.bar);
    renderTsChangeList(); renderAll();
  });

  // Bar edit
  function shiftBarsFrom(afterBar,delta){
    entries.forEach(e=>{ if(e.bar>afterBar) e.bar+=delta; });
    rhythmEntries.forEach(r=>{ if(r.bar>afterBar) r.bar+=delta; });
    repeatEntries.forEach(r=>{ if(r.bar>afterBar) r.bar+=delta; });
    keyChanges.forEach(c=>{ if(c.bar>afterBar) c.bar+=delta; });
    timeSigChanges.forEach(c=>{ if(c.bar>afterBar) c.bar+=delta; });
    sectionLabels.forEach(s=>{ if(s.bar>afterBar) s.bar+=delta; });
    entries.sort((a,b)=>a.bar-b.bar||a.beat-b.beat);
    rhythmEntries.sort((a,b)=>a.bar-b.bar||a.beatOffset-b.beatOffset);
    keyChanges.sort((a,b)=>a.bar-b.bar); timeSigChanges.sort((a,b)=>a.bar-b.bar);
    sectionLabels.sort((a,b)=>a.bar-b.bar);
  }
  document.getElementById('barInsertAfterBtn').addEventListener('click',()=>{
    const n=parseInt(document.getElementById('barEditNum').value,10)||1;
    shiftBarsFrom(n,1); renderKeyChangeList(); renderTsChangeList(); renderSectionList(); renderNoteList(); renderAll();
  });
  document.getElementById('barDeleteBtn').addEventListener('click',()=>{
    const n=parseInt(document.getElementById('barEditNum').value,10)||1;
    entries=entries.filter(e=>e.bar!==n); rhythmEntries=rhythmEntries.filter(r=>r.bar!==n);
    keyChanges=keyChanges.filter(c=>c.bar!==n||c===keyChanges[0]);
    timeSigChanges=timeSigChanges.filter(c=>c.bar!==n||c===timeSigChanges[0]);
    sectionLabels=sectionLabels.filter(s=>s.bar!==n);
    shiftBarsFrom(n,-1); renderKeyChangeList(); renderTsChangeList(); renderSectionList(); renderNoteList(); renderAll();
  });

  // Settings changes
  rootSelect.addEventListener('change',()=>{ keyChanges[0].root=parseInt(rootSelect.value,10); buildDegreeButtons(); renderAll(); });
  modeSelect.addEventListener('change',()=>{ keyChanges[0].mode=modeSelect.value; buildDegreeButtons(); renderAll(); });
  beatsNum.addEventListener('input',()=>{ timeSigChanges[0].num=parseInt(beatsNum.value,10)||4; renderTsChangeList(); renderAll(); });
  beatsDen.addEventListener('change',()=>{ timeSigChanges[0].den=parseInt(beatsDen.value,10)||4; renderTsChangeList(); renderAll(); });
  barsPerRowInput.addEventListener('input',renderSheet);
  inputModeSel.addEventListener('change',buildDegreeButtons);
  fontSizeInput.addEventListener('input',()=>{ fontSizeOut.textContent=fontSizeInput.value+'px'; renderSheet(); });
  chordFontFamily.addEventListener('change',renderSheet);
  titleInput.addEventListener('input',renderSheet);
  titleFontSize.addEventListener('input',()=>{ titleFontSizeOut.textContent=titleFontSize.value+'px'; renderSheet(); });
  titleFontFamily.addEventListener('change',renderSheet);
  copyrightInput.addEventListener('input',renderSheet);

  // Clear & copy
  document.getElementById('clearBtn').addEventListener('click',()=>{ entries=[]; curBar=null; curBeat=1; selectedBarNum=null; updateSelBarInfo(); renderAll(); });
  document.getElementById('copyBtn').addEventListener('click',()=>{
    const bpRow=parseInt(barsPerRowInput.value,10)||4;
    const barMap=buildBarMap();
    const maxBar=entries.length?Math.max(...entries.map(e=>e.bar)):0;
    let lines=[]; if(titleInput.value) lines.push(titleInput.value);
    for(let rs=1;rs<=maxBar;rs+=bpRow){
      let cells=[]; for(let b=rs;b<rs+bpRow;b++) cells.push(barMap[b]?barMap[b].map(c=>c.symbol).join('/'):'%');
      lines.push(cells.join(' | '));
    }
    navigator.clipboard.writeText(lines.join('\n'));
  });

  // PDF
  document.getElementById('pdfBtn').addEventListener('click',async()=>{
    if(!window.jspdf||!window.html2canvas){ alert('ライブラリ読み込み中です。しばらくお待ちください。'); return; }
    const {jsPDF}=window.jspdf;
    const pages=sheetEl.querySelectorAll('.page');
    if(!pages.length){ alert('コードを入力してください。'); return; }
    const btn=document.getElementById('pdfBtn'); btn.textContent='生成中...'; btn.disabled=true;
    const bgColor=getComputedStyle(document.documentElement).getPropertyValue('--surface').trim()||'#ffffff';
    try{
      const A4_W=2480,A4_H=3508;
      const width=700; // SVGコンテンツ幅。renderSheet()内のwidthと同じ値（ローカルスコープのため直接参照できない）
      const doc=new jsPDF({unit:'px',format:[A4_W,A4_H],orientation:'portrait'});
      for(let i=0;i<pages.length;i++){
        const page=pages[i];
        const pageW=width+32; // SVGコンテンツ幅(700)+パディング(16*2)
        const scale=A4_W/pageW;
        const canvas=await html2canvas(page,{scale,useCORS:true,backgroundColor:bgColor,logging:false,width:pageW,windowWidth:pageW});
        const outCanvas=document.createElement('canvas'); outCanvas.width=A4_W; outCanvas.height=A4_H;
        const ctx=outCanvas.getContext('2d'); ctx.fillStyle=bgColor; ctx.fillRect(0,0,A4_W,A4_H);
        ctx.drawImage(canvas,0,0,A4_W,Math.round(canvas.height*(A4_W/canvas.width)));
        if(i>0) doc.addPage([A4_W,A4_H],'portrait');
        doc.addImage(outCanvas.toDataURL('image/jpeg',0.96),'JPEG',0,0,A4_W,A4_H);
      }
      doc.save('chord-leadsheet.pdf');
    }catch(err){ alert('PDF生成に失敗しました: '+err.message); }
    finally{ btn.textContent='PDF出力'; btn.disabled=false; }
  });

  // Keyboard
  document.addEventListener('keydown',e=>{
    const tag=document.activeElement&&document.activeElement.tagName;
    if(tag==='SELECT'||tag==='INPUT'||tag==='TEXTAREA') return;
    if(e.key>='1'&&e.key<='7'){ addEntry(parseInt(e.key,10)); }
    else if(e.key==='0'){ addNCEntry(); }
    else if(e.key==='Backspace'){
      e.preventDefault();
      const removed=entries.pop();
      if(removed){ curBar=removed.bar; curBeat=removed.beat; selectedBarNum=curBar; }
      updateSelBarInfo(); renderAll();
    }
  });

  // イベント委譲（一度だけ登録）
  sheetEl.addEventListener('click',handleSheetClick);
  sheetEl.addEventListener('dragover',handleDragOver);
  sheetEl.addEventListener('drop',handleDrop);

  // Init
  // 記号チップ画像のsrcをセット（ダークモードは色反転）
  document.getElementById('segnoChipImg').src = SEGNO_IMG;
  document.getElementById('codaChipImg').src  = CODA_IMG;
  // ダークモードでは画像を白に反転
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(prefersDark){
    document.querySelectorAll('#segnoChipImg,#codaChipImg').forEach(img=>{
      img.style.filter='invert(1)';
    });
  }


  // ── フローティングコード入力パネルのドラッグ ──
  (function(){
    const panel = document.getElementById('chordInputPanel');
    const handle = document.getElementById('chordDragHandle');
    // bodyの直下に移動して position:fixed が確実に効くように
    document.body.appendChild(panel);

    let drag = null;
    function startDrag(cx, cy){
      const r = panel.getBoundingClientRect();
      panel.style.transform = 'none';
      panel.style.left = r.left + 'px';
      panel.style.top  = r.top  + 'px';
      panel.style.bottom = 'auto';
      drag = { sx: cx, sy: cy, ol: r.left, ot: r.top };
    }
    function moveDrag(cx, cy){
      if(!drag) return;
      let nl = drag.ol + cx - drag.sx;
      let nt = drag.ot + cy - drag.sy;
      // 画面外に出ないよう制限
      nl = Math.max(0, Math.min(window.innerWidth  - panel.offsetWidth,  nl));
      nt = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, nt));
      panel.style.left = nl + 'px';
      panel.style.top  = nt + 'px';
    }
    function endDrag(){ drag = null; }

    handle.addEventListener('mousedown', e => {
      if(['BUTTON','SELECT','INPUT'].includes(e.target.tagName)) return;
      e.preventDefault(); startDrag(e.clientX, e.clientY);
    });
    document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
    document.addEventListener('mouseup',   endDrag);

    handle.addEventListener('touchstart', e => {
      if(['BUTTON','SELECT','INPUT'].includes(e.target.tagName)) return;
      e.preventDefault();
      const t = e.touches[0]; startDrag(t.clientX, t.clientY);
    }, {passive:false});
    handle.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0]; moveDrag(t.clientX, t.clientY);
    }, {passive:false});
    handle.addEventListener('touchend', endDrag);

    document.getElementById('snapTop').addEventListener('click', () => {
      panel.style.top = '16px'; panel.style.bottom = 'auto';
      panel.style.left = '50%'; panel.style.transform = 'translateX(-50%)';
    });
    document.getElementById('snapBottom').addEventListener('click', () => {
      panel.style.top = 'auto'; panel.style.bottom = 'calc(16px + env(safe-area-inset-bottom))';
      panel.style.left = '50%'; panel.style.transform = 'translateX(-50%)';
    });
  })();

  buildDegreeButtons(); updateSelBarInfo(); renderKeyChangeList(); renderTsChangeList(); renderSectionList(); renderNoteList(); renderRepeatList(); renderSheet();
})();
</script>
</body>
</html>
